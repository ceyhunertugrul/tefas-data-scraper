name: TEFAS Veri Güncelleme

on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write  # GitHub Action için zorunlu yazma yetkisi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4  # Node.js uyarısı düzeltildi

      - name: Python kur
        uses: actions/setup-python@v5 # Node.js uyarısı düzeltildi
        with:
          python-version: '3.9'

      - name: Gerekli paketleri kur
        run: pip install requests pandas

      - name: Scraper çalıştır
        run: python scraper.py

      - name: Değişiklikleri kaydet ve gönder
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add data/fon_verileri.json
          # Yapısal Düzeltme: Yalnızca dosya değiştiyse commit at
          git diff --quiet && git diff --staged --quiet || (git commit -m "Günlük TEFAS verisi güncellendi" && git push)
